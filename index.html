<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Lernen — Belajar Bahasa Jerman</title>
<style>
  @font-face { font-family: 'system-display'; src: local('Arial'); }
  :root {
    --bg: #F1ECDE;
    --paper: #FBF8F1;
    --ink: #191817;
    --red: #BC3A2C;
    --blue: #28518C;
    --yellow: #DFA22C;
    --line: #D9D1BC;
    --muted: #7A7364;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
  }
  .display { font-family: 'Trebuchet MS', 'Segoe UI', sans-serif; font-weight: 700; letter-spacing: -0.01em; }
  .mono { font-family: 'Consolas', 'SF Mono', 'Courier New', monospace; }
  button { font-family: inherit; cursor: pointer; }
  button:focus-visible, [tabindex]:focus-visible { outline: 3px solid var(--blue); outline-offset: 2px; }
  .btn { transition: transform .12s ease; }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  @media (prefers-reduced-motion: reduce) { .btn { transition: none; } }

  header { border-bottom: 3px solid var(--ink); background: var(--paper); }
  .wrap { max-width: 880px; margin: 0 auto; padding: 28px 20px 20px; }
  h1 { font-size: clamp(36px, 7vw, 58px); line-height: 1; margin: 10px 0 6px; }
  .subtitle { font-size: 16px; color: var(--muted); max-width: 560px; margin: 0; }
  .shapes-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .eyebrow { font-size: 12px; color: var(--muted); margin-left: 8px; }

  .shape { flex-shrink: 0; display: inline-block; }
  .shape.circle { border-radius: 50%; border: 2px solid; }
  .shape.square { border: 2px solid; }
  .shape.triangle {
    width: 0; height: 0; border-left: solid transparent; border-right: solid transparent; border-bottom-style: solid;
  }

  .pace-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
  .pace-btn { padding: 10px 16px; border: 2px solid var(--ink); background: var(--paper); text-align: left; }
  .pace-btn.active { background: var(--ink); color: var(--paper); }
  .pace-btn .label { font-size: 14px; font-weight: 700; }
  .pace-btn .sub { font-weight: 400; font-size: 11px; opacity: .75; margin-top: 2px; }

  .progress-strip { margin-top: 20px; }
  .progress-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; font-size: 12px; color: var(--muted); }
  .progress-shapes { display: flex; gap: 8px; flex-wrap: wrap; }

  nav.tabs { max-width: 880px; margin: 0 auto; display: flex; gap: 4px; padding: 0 20px; overflow-x: auto; }
  .tab-btn { padding: 12px 16px; background: transparent; border: none; border-bottom: 3px solid transparent; font-weight: 700; font-size: 14px; color: var(--muted); white-space: nowrap; }
  .tab-btn.active { border-bottom-color: var(--red); color: var(--ink); }

  main { max-width: 880px; margin: 0 auto; padding: 24px 20px 60px; }

  .module { border: 2px solid var(--ink); background: var(--paper); margin-bottom: 14px; }
  .module-head { width: 100%; display: flex; align-items: center; gap: 14px; padding: 16px 18px; background: transparent; border: none; text-align: left; }
  .module-tag { font-size: 11px; color: var(--muted); }
  .module-title { font-weight: 700; font-size: 18px; }
  .module-toggle { color: var(--muted); font-size: 13px; }
  .module-body { border-top: 2px solid var(--line); }
  .task-row { display: flex; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--line); cursor: pointer; align-items: flex-start; }
  .task-row:last-child { border-bottom: none; }
  .task-row input { margin-top: 4px; width: 16px; height: 16px; accent-color: var(--red); }
  .task-day { font-size: 11px; color: var(--blue); margin-bottom: 2px; }
  .task-title { font-weight: 600; }
  .task-title.done { text-decoration: line-through; opacity: .55; }
  .task-desc { font-size: 14px; color: var(--muted); margin-top: 2px; }

  .cat-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .cat-btn { padding: 6px 14px; border: 2px solid var(--ink); background: transparent; font-size: 12px; }
  .cat-btn.active { background: var(--ink); color: var(--paper); }

  .flashcard { border: 3px solid var(--ink); background: var(--paper); min-height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; position: relative; cursor: pointer; }
  .flashcard .corner-shape { position: absolute; top: 16px; left: 16px; }
  .flashcard .cognate-tag { position: absolute; top: 16px; right: 16px; font-size: 10px; background: var(--yellow); color: var(--ink); padding: 3px 8px; }
  .card-word { font-size: 38px; font-weight: 700; }
  .card-word.answer { font-size: 30px; }
  .card-hint { font-size: 12px; color: var(--muted); margin-top: 10px; }
  .card-en { font-size: 14px; color: var(--muted); margin-top: 10px; }
  .card-cat { font-size: 11px; color: var(--blue); margin-top: 14px; }

  .card-controls { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .nav-btn { padding: 9px 16px; border: 2px solid var(--ink); background: transparent; color: var(--ink); font-weight: 700; font-size: 13px; }
  .nav-btn.mastered { background: var(--blue); color: var(--paper); border-color: var(--blue); }
  .nav-btn.push-right { margin-left: auto; }
  .card-counter { font-size: 12px; color: var(--muted); margin-top: 10px; }

  .grammar-item { border: 2px solid var(--ink); background: var(--paper); margin-bottom: 12px; }
  .grammar-head { width: 100%; display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: transparent; border: none; text-align: left; }
  .grammar-num { font-size: 12px; color: var(--red); min-width: 22px; }
  .grammar-title { font-weight: 700; font-size: 16px; flex: 1; }
  .grammar-body { padding: 0 18px 18px; border-top: 1px solid var(--line); padding-top: 14px; }
  .grammar-body p { font-size: 15px; line-height: 1.6; margin: 0 0 12px; }
  .grammar-examples { background: var(--bg); border: 1px solid var(--line); padding: 12px; margin-bottom: 12px; }
  .grammar-examples div { font-size: 13px; margin-bottom: 6px; }
  .grammar-examples div:last-child { margin-bottom: 0; }
  .grammar-note { font-size: 13px; color: var(--blue); border-left: 3px solid var(--blue); padding-left: 10px; }

  .quiz-box { border: 3px solid var(--ink); background: var(--paper); padding: 26px; }
  .quiz-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .quiz-q { font-size: 22px; margin-bottom: 20px; }
  .quiz-opts { display: flex; flex-direction: column; gap: 10px; }
  .quiz-opt { text-align: left; padding: 13px 16px; border: 2px solid var(--ink); background: transparent; color: var(--ink); font-size: 15px; }
  .quiz-opt.correct { background: var(--blue); border-color: var(--blue); color: var(--paper); }
  .quiz-opt.wrong { background: var(--red); border-color: var(--red); color: var(--paper); }
  .quiz-exp { margin-top: 16px; font-size: 14px; color: var(--muted); }
  .quiz-next { margin-top: 18px; background: var(--ink); color: var(--paper); }
  .quiz-result { border: 3px solid var(--ink); background: var(--paper); padding: 30px; text-align: center; }
  .quiz-result .shapes { display: flex; justify-content: center; gap: 8px; margin-bottom: 14px; }
  .quiz-result h3 { font-size: 28px; margin: 0 0 6px; }
  .quiz-result p { color: var(--muted); margin-bottom: 20px; }

  .stat-card { border: 2px solid var(--ink); background: var(--paper); padding: 20px; margin-bottom: 16px; }
  .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .stat-sub { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .stat-bar-track { height: 10px; background: var(--bg); border: 1px solid var(--line); }
  .stat-bar-fill { height: 100%; background: var(--red); }
  .progres-note { font-size: 12px; color: var(--muted); text-align: center; margin-top: 8px; }
  .reset-btn { align-self: center; border-color: var(--red); color: var(--red); display: block; margin: 14px auto 0; }
</style>
</head>

var TABS = [
  { id: "jadwal", label: "Jadwal" },
  { id: "kosakata", label: "Kosakata" },
  { id: "tatabahasa", label: "Tata Bahasa" },
  { id: "kuis", label: "Kuis" },
  { id: "progres", label: "Progres" }

var SHAPES = ["circle", "square", "triangle"];
var SHAPE_COLOR = { circle: "var(--blue)", square: "var(--red)", triangle: "var(--yellow)" };
var CATEGORIES = ["Semua"];
(function () {
  var seen = {};
  VOCAB.forEach(function (v) {
    if (!seen[v.cat]) { seen[v.cat] = true; CATEGORIES.push(v.cat); }
  });
})();

/* ============================== STATE ============================== */

var STORAGE_KEY = "deutsch-lernen-progress-v1";
function loadSaved() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}
function persist() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      pace: state.pace, completed: state.completed, mastered: state.mastered, bestScore: state.bestScore
    }));
  } catch (e) { /* storage unavailable */ }
}

var saved = loadSaved();
var state = {
  pace: saved.pace || "slow",
  tab: "jadwal",
  openModule: 0,
  completed: saved.completed || {},
  vocabCat: "Semua",
  vocabIdx: 0,
  flipped: false,
  mastered: saved.mastered || {},
  openGrammar: 0,
  qIdx: 0,
  selected: null,
  score: 0,
  quizDone: false,
  bestScore: saved.bestScore != null ? saved.bestScore : null
};

/* ============================== HELPERS ============================== */

function esc(s) {
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function shapeHTML(type, size, filled, extraStyle) {
  var color = SHAPE_COLOR[type];
  var style = "width:" + size + "px;height:" + size + "px;" + (extraStyle || "");
  if (type === "circle") {
    return '<span class="shape circle" style="' + style + 'border-color:' + color + ';background:' + (filled ? color : "transparent") + ';"></span>';
  }
  if (type === "square") {
    return '<span class="shape square" style="' + style + 'border-color:' + color + ';background:' + (filled ? color : "transparent") + ';"></span>';
  }
  var half = size / 2 + 1;
  var triStyle = "width:0;height:0;border-left:" + half + "px solid transparent;border-right:" + half + "px solid transparent;border-bottom:" + (size + 1) + "px solid " + (filled ? color : "var(--paper)") + ";" + (filled ? "" : "box-sizing:content-box;");
  return '<span class="shape triangle" style="' + triStyle + '"></span>';
}

function currentTasks(mod) { return state.pace === "fast" ? mod.tasksFast : mod.tasksSlow; }

function totalDays() {
  var sum = 0;
  MODULES.forEach(function (m) { sum += currentTasks(m).length; });
  return sum;
}
function completedCount() {
  var n = 0;
  Object.keys(state.completed).forEach(function (k) {
    if (k.indexOf(state.pace + "-") === 0 && state.completed[k]) n++;
  });
  return n;
}
function filteredVocab() {
  if (state.vocabCat === "Semua") return VOCAB;
  return VOCAB.filter(function (v) { return v.cat === state.vocabCat; });
}
function masteredCount() {
  var n = 0;
  Object.keys(state.mastered).forEach(function (k) { if (state.mastered[k]) n++; });
  return n;
}

/* ============================== RENDER ============================== */

var root = document.getElementById("root");

function render() {
  var html = "";
  html += renderHeader();
  html += '<main>' + renderTabContent() + '</main>';
  root.innerHTML = html;
  attachEvents();
}

function renderHeader() {
  var fastLen = 0, slowLen = 0;
  MODULES.forEach(function (m) { fastLen += m.tasksFast.length; slowLen += m.tasksSlow.length; });

  var progShapes = "";
  MODULES.forEach(function (m, mIdx) {
    var tasks = currentTasks(m);
    var done = 0;
    tasks.forEach(function (_, tIdx) { if (state.completed[state.pace + "-" + mIdx + "-" + tIdx]) done++; });
    var full = done === tasks.length && tasks.length > 0;
    var shape = SHAPES[mIdx % 3];
    progShapes += '<span title="' + esc(m.title) + ': ' + done + '/' + tasks.length + '">' + shapeHTML(shape, 16, full) + '</span>';
  });

  var tabsHTML = "";
  TABS.forEach(function (t) {
    tabsHTML += '<button class="tab-btn' + (state.tab === t.id ? ' active' : '') + '" data-tab="' + t.id + '">' + t.label + '</button>';
  });

  return (
    '<header>' +
      '<div class="wrap">' +
        '<div class="shapes-row">' +
          shapeHTML("circle", 20, true) + shapeHTML("square", 18, true) + shapeHTML("triangle", 20, true) +
          '<span class="mono eyebrow">PUNKT · LINIE · FLÄCHE</span>' +
        '</div>' +
        '<h1 class="display">DEUTSCH LERNEN</h1>' +
        '<p class="subtitle">Kuasai dasar bahasa Jerman dalam 30–60 hari. Dirancang untuk pemula, dan memanfaatkan bahasa Inggris yang sudah kamu kuasai — banyak kata Jerman punya kerabat dekat dalam bahasa Inggris (disingkat <strong>kognat</strong>).</p>' +
        '<div class="pace-row">' +
          '<button class="btn pace-btn' + (state.pace === "fast" ? ' active' : '') + '" data-pace="fast"><div class="label">Cepat · ±30 Hari</div><div class="mono sub">' + fastLen + ' sesi belajar</div></button>' +
          '<button class="btn pace-btn' + (state.pace === "slow" ? ' active' : '') + '" data-pace="slow"><div class="label">Santai · 60 Hari</div><div class="mono sub">' + slowLen + ' sesi belajar</div></button>' +
        '</div>' +
        '<div class="progress-strip">' +
          '<div class="progress-head mono"><span>PROGRES MODUL</span><span>' + completedCount() + '/' + totalDays() + ' sesi</span></div>' +
          '<div class="progress-shapes">' + progShapes + '</div>' +
        '</div>' +
      '</div>' +
      '<nav class="tabs">' + tabsHTML + '</nav>' +
    '</header>'
  );
}

function renderTabContent() {
  if (state.tab === "jadwal") return renderJadwal();
  if (state.tab === "kosakata") return renderKosakata();
  if (state.tab === "tatabahasa") return renderTataBahasa();
  if (state.tab === "kuis") return renderKuis();
  if (state.tab === "progres") return renderProgres();
  return "";
}

function renderJadwal() {
  var html = "";
  var dayCounter = 0;
  MODULES.forEach(function (m, mIdx) {
    var tasks = currentTasks(m);
    var startDay = dayCounter + 1;
    dayCounter += tasks.length;
    var shape = SHAPES[mIdx % 3];
    var isOpen = state.openModule === mIdx;

    html += '<div class="module">';
    html += '<button class="btn module-head" data-module="' + mIdx + '">';
    html += shapeHTML(shape, 22, true);
    html += '<div style="flex:1;">';
    html += '<div class="module-tag mono">' + esc(m.tag) + ' · HARI ' + startDay + '–' + dayCounter + '</div>';
    html += '<div class="module-title display">' + esc(m.title) + '</div>';
    html += '</div>';
    html += '<span class="module-toggle mono">' + (isOpen ? '–' : '+') + '</span>';
    html += '</button>';

    if (isOpen) {
      html += '<div class="module-body">';
      tasks.forEach(function (task, tIdx) {
        var key = state.pace + "-" + mIdx + "-" + tIdx;
        var done = !!state.completed[key];
        html += '<label class="task-row">';
        html += '<input type="checkbox" data-task="' + mIdx + ':' + tIdx + '"' + (done ? ' checked' : '') + '>';
        html += '<div style="flex:1;">';
        html += '<div class="task-day mono">HARI ' + (startDay + tIdx) + '</div>';
        html += '<div class="task-title' + (done ? ' done' : '') + '">' + esc(task.t) + '</div>';
        html += '<div class="task-desc">' + esc(task.d) + '</div>';
        html += '</div>';
        html += '</label>';
      });
      html += '</div>';
    }
    html += '</div>';
  });
  return html;
}

function renderKosakata() {
  var list = filteredVocab();
  if (state.vocabIdx >= list.length) state.vocabIdx = 0;
  var card = list[state.vocabIdx];

  var catHTML = "";
  CATEGORIES.forEach(function (c) {
    catHTML += '<button class="btn cat-btn' + (state.vocabCat === c ? ' active' : '') + ' mono" data-cat="' + esc(c) + '">' + esc(c) + '</button>';
  });

  if (!card) return '<div class="cat-row">' + catHTML + '</div>';

  var isMastered = !!state.mastered[card.de];
  var cardInner = "";
  if (!state.flipped) {
    cardInner =
      shapeHTML(SHAPES[state.vocabIdx % 3], 16, true, "position:absolute;") +
      (card.cog ? '<span class="cognate-tag mono">MIRIP INGGRIS</span>' : '') +
      '<div class="card-word display">' + esc(card.de) + '</div>' +
      '<div class="card-hint mono">Ketuk untuk lihat arti</div>';
  } else {
    cardInner =
      shapeHTML(SHAPES[state.vocabIdx % 3], 16, true, "position:absolute;") +
      '<div class="card-word answer display">' + esc(card.id) + '</div>' +
      (card.cog ? '<div class="card-en">Bahasa Inggris: <strong>' + esc(card.en) + '</strong> — coba rasakan kemiripannya.</div>' : '') +
      '<div class="card-cat mono">' + esc(card.cat) + '</div>';
  }
  // Fix absolute positioning wrapper for corner shape
  cardInner = cardInner.replace('<span class="shape', '<span class="corner-shape shape');

  var html = '<div class="cat-row">' + catHTML + '</div>';
  html += '<div class="btn flashcard" id="flashcard">' + cardInner + '</div>';
  html += '<div class="card-controls">';
  html += '<button class="btn nav-btn" data-cardnav="-1">← Sebelumnya</button>';
  html += '<button class="btn nav-btn" data-cardnav="1">Berikutnya →</button>';
  html += '<button class="btn nav-btn" data-cardnav="shuffle">Kocok</button>';
  html += '<button class="btn nav-btn push-right' + (isMastered ? ' mastered' : '') + '" data-master="' + esc(card.de) + '">' + (isMastered ? '✓ Sudah Hafal' : 'Tandai Sudah Hafal') + '</button>';
  html += '</div>';
  html += '<div class="card-counter mono">Kartu ' + (state.vocabIdx + 1) + ' / ' + list.length + '</div>';
  return html;
}

function renderTataBahasa() {
  var html = "";
  GRAMMAR.forEach(function (g, i) {
    var isOpen = state.openGrammar === i;
    html += '<div class="grammar-item">';
    html += '<button class="btn grammar-head" data-grammar="' + i + '">';
    html += '<span class="grammar-num mono">' + String(i + 1).padStart(2, "0") + '</span>';
    html += '<span class="grammar-title display">' + esc(g.title) + '</span>';
    html += '<span class="mono" style="color:var(--muted);">' + (isOpen ? '–' : '+') + '</span>';
    html += '</button>';
    if (isOpen) {
      html += '<div class="grammar-body">';
      html += '<p>' + esc(g.body) + '</p>';
      html += '<div class="grammar-examples">';
      g.examples.forEach(function (ex) { html += '<div class="mono">' + esc(ex) + '</div>'; });
      html += '</div>';
      html += '<div class="grammar-note">' + esc(g.note) + '</div>';
      html += '</div>';
    }
    html += '</div>';
  });
  return html;
}

function renderKuis() {
  if (!state.quizDone) {
    var q = QUIZ[state.qIdx];
    var optsHTML = "";
    q.opts.forEach(function (opt, oi) {
      var cls = "";
      if (state.selected !== null) {
        if (oi === q.a) cls = " correct";
        else if (oi === state.selected) cls = " wrong";
      }
      optsHTML += '<button class="btn quiz-opt' + cls + '" data-quizopt="' + oi + '"' + (state.selected !== null ? ' disabled' : '') + '>' + esc(opt) + '</button>';
    });
    var html = '<div class="quiz-box">';
    html += '<div class="quiz-meta mono"><span>SOAL ' + (state.qIdx + 1) + ' / ' + QUIZ.length + '</span><span>SKOR: ' + state.score + '</span></div>';
    html += '<h3 class="quiz-q display">' + esc(q.q) + '</h3>';
    html += '<div class="quiz-opts">' + optsHTML + '</div>';
    if (state.selected !== null) {
      html += '<div class="quiz-exp">' + esc(q.exp) + '</div>';
      html += '<button class="btn nav-btn quiz-next" id="quizNext">' + (state.qIdx + 1 >= QUIZ.length ? 'Lihat Hasil' : 'Soal Berikutnya →') + '</button>';
    }
    html += '</div>';
    return html;
  } else {
    var shapesHTML = "";
    SHAPES.forEach(function (s, i) {
      shapesHTML += shapeHTML(s, 26, (state.score / QUIZ.length) > (i / 3));
    });
    var msg;
    if (state.score === QUIZ.length) msg = "Sempurna! Kamu siap lanjut ke modul berikutnya.";
    else if (state.score >= QUIZ.length * 0.7) msg = "Bagus! Sedikit lagi review dan kamu benar-benar siap.";
    else msg = "Belum apa-apa — ulangi kosakata dan tata bahasa lalu coba lagi.";

    var html = '<div class="quiz-result">';
    html += '<div class="shapes">' + shapesHTML + '</div>';
    html += '<h3 class="display">' + state.score + ' / ' + QUIZ.length + ' Benar</h3>';
    html += '<p>' + msg + '</p>';
    html += '<button class="btn nav-btn" id="quizRestart" style="background:var(--ink);color:var(--paper);">Ulangi Kuis</button>';
    html += '</div>';
    return html;
  }
}

function statCardHTML(label, value, sub, pct) {
  return (
    '<div class="stat-card">' +
      '<div class="stat-label mono">' + esc(label.toUpperCase()) + '</div>' +
      '<div class="stat-value display">' + esc(value) + '</div>' +
      '<div class="stat-sub">' + esc(sub) + '</div>' +
      '<div class="stat-bar-track"><div class="stat-bar-fill" style="width:' + Math.min(100, Math.max(0, pct * 100)) + '%;"></div></div>' +
    '</div>'
  );
}

function renderProgres() {
  var cc = completedCount(), td = totalDays();
  var mc = masteredCount();
  var html = "";
  html += statCardHTML("Jadwal Belajar", cc + " / " + td, Math.round((cc / td) * 100) + "% sesi selesai (mode " + (state.pace === "fast" ? "Cepat" : "Santai") + ")", cc / td);
  html += statCardHTML("Kosakata Dihafal", mc + " / " + VOCAB.length, Math.round((mc / VOCAB.length) * 100) + "% kosakata ditandai hafal", mc / VOCAB.length);
  html += statCardHTML("Kuis", state.bestScore === null ? "Belum dicoba" : (state.bestScore + " / " + QUIZ.length), state.bestScore === null ? "Coba tab Kuis untuk mulai" : "Skor terbaik sejauh ini", state.bestScore === null ? 0 : state.bestScore / QUIZ.length);
  html += '<div class="progres-note mono">Progres tersimpan otomatis di browser ini, walau file ditutup atau komputer dimatikan.</div>';
  html += '<button class="btn nav-btn reset-btn" id="resetProgress">Reset Semua Progres</button>';
  return html;
}

/* ============================== EVENTS ============================== */

function attachEvents() {
  // Tabs
  root.querySelectorAll("[data-tab]").forEach(function (el) {
    el.addEventListener("click", function () {
      state.tab = el.getAttribute("data-tab");
      render();
    });
  });
  // Pace toggle
  root.querySelectorAll("[data-pace]").forEach(function (el) {
    el.addEventListener("click", function () {
      state.pace = el.getAttribute("data-pace");
      persist();
      render();
    });
  });
  // Module accordion
  root.querySelectorAll("[data-module]").forEach(function (el) {
    el.addEventListener("click", function () {
      var idx = parseInt(el.getAttribute("data-module"), 10);
      state.openModule = state.openModule === idx ? -1 : idx;
      render();
    });
  });
  // Task checkboxes
  root.querySelectorAll("[data-task]").forEach(function (el) {
    el.addEventListener("change", function () {
      var parts = el.getAttribute("data-task").split(":");
      var key = state.pace + "-" + parts[0] + "-" + parts[1];
      state.completed[key] = !state.completed[key];
      persist();
      render();
    });
  });
  // Vocab category
  root.querySelectorAll("[data-cat]").forEach(function (el) {
    el.addEventListener("click", function () {
      state.vocabCat = el.getAttribute("data-cat");
      state.vocabIdx = 0;
      state.flipped = false;
      render();
    });
  });
  // Flashcard flip
  var fc = document.getElementById("flashcard");
  if (fc) {
    fc.addEventListener("click", function () {
      state.flipped = !state.flipped;
      render();
    });
  }
  // Card nav
  root.querySelectorAll("[data-cardnav]").forEach(function (el) {
    el.addEventListener("click", function (e) {
      e.stopPropagation();
      var dir = el.getAttribute("data-cardnav");
      var list = filteredVocab();
      state.flipped = false;
      if (dir === "shuffle") {
        state.vocabIdx = Math.floor(Math.random() * list.length);
      } else {
        var d = parseInt(dir, 10);
        state.vocabIdx = ((state.vocabIdx + d) % list.length + list.length) % list.length;
      }
      render();
    });
  });
  // Master toggle
  root.querySelectorAll("[data-master]").forEach(function (el) {
    el.addEventListener("click", function (e) {
      e.stopPropagation();
      var word = el.getAttribute("data-master");
      state.mastered[word] = !state.mastered[word];
      persist();
      render();
    });
  });
  // Grammar accordion
  root.querySelectorAll("[data-grammar]").forEach(function (el) {
    el.addEventListener("click", function () {
      var idx = parseInt(el.getAttribute("data-grammar"), 10);
      state.openGrammar = state.openGrammar === idx ? -1 : idx;
      render();
    });
  });
  // Quiz options
  root.querySelectorAll("[data-quizopt]").forEach(function (el) {
    el.addEventListener("click", function () {
      if (state.selected !== null) return;
      var oi = parseInt(el.getAttribute("data-quizopt"), 10);
      state.selected = oi;
      if (oi === QUIZ[state.qIdx].a) state.score++;
      render();
    });
  });
  var quizNext = document.getElementById("quizNext");
  if (quizNext) {
    quizNext.addEventListener("click", function () {
      if (state.qIdx + 1 >= QUIZ.length) {
        state.bestScore = state.bestScore === null ? state.score : Math.max(state.bestScore, state.score);
        state.quizDone = true;
        persist();
      } else {
        state.qIdx++;
        state.selected = null;
      }
      render();
    });
  }
  var quizRestart = document.getElementById("quizRestart");
  if (quizRestart) {
    quizRestart.addEventListener("click", function () {
      state.qIdx = 0;
      state.selected = null;
      state.score = 0;
      state.quizDone = false;
      render();
    });
  }
  // Reset progress
  var resetBtn = document.getElementById("resetProgress");
  if (resetBtn) {
    resetBtn.addEventListener("click", function () {
      if (window.confirm("Hapus semua progres tersimpan? Tindakan ini tidak bisa dibatalkan.")) {
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
        state.completed = {};
        state.mastered = {};
        state.bestScore = null;
        render();
      }
    });
  }
}

render();
</script>
</body>
</html>
